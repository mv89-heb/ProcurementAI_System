<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מערכת בקרה חכמה</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

button {
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ddd;
    padding: 8px;
}

#debug-box {
    background: black;
    color: #00ff00;
    padding: 10px;
    margin-top: 20px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h2>בדיקת חשבוניות</h2>

<label>בחר ספק:</label>
<select id="supplier"></select>

<br><br>

<input type="file" id="file">

<br>

<button onclick="analyze()">בדיקה</button>

<table>
<thead>
<tr>
<th>SKU</th>
<th>מחיר בפועל</th>
<th>מחיר מאושר</th>
<th>נמצא ב-DB</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<div id="debug-box"></div>

</div>

<script>

async function loadSuppliers(){
    const res = await fetch('/api/get-suppliers');
    const data = await res.json();

    const sel = document.getElementById('supplier');
    sel.innerHTML = '<option value="">בחר ספק</option>';

    data.suppliers.forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}

async function analyze(){

    const sup = document.getElementById('supplier').value;
    const file = document.getElementById('file').files[0];

    if(!sup || !file){
        alert("בחר ספק וקובץ");
        return;
    }

    const fd = new FormData();
    fd.append("supplier_name", sup);
    fd.append("invoice", file);

    const res = await fetch('/api/analyze-prices', {
        method: 'POST',
        body: fd
    });

    const data = await res.json();

    console.log("FULL RESPONSE:", data);

    // ✅ DEBUG על המסך
    document.getElementById("debug-box").innerHTML = `
        <h3>DEBUG</h3>
        <p>כמות רשומות DB: ${data.debug?.db_count}</p>
        <p>AI זיהה פריטים:</p>
        <pre>${JSON.stringify(data.debug?.ai_items, null, 2)}</pre>
    `;

    const body = document.getElementById("body");
    body.innerHTML = "";

    data.results.forEach(r=>{
        body.innerHTML += `
        <tr>
            <td>${r.sku}</td>
            <td>${r.invoice_price}</td>
            <td>${r.approved_price ?? 'לא נמצא'}</td>
            <td>${r.found_in_db ? '✅' : '❌'}</td>
        </tr>`;
    });
}

loadSuppliers();

</script>

</body>
</html>
