<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

https://cdn.jsdelivr.net/npm/chart.js

<style>
body { background:#0f172a;color:white;font-family:Arial }
.container{max-width:1100px;margin:auto;padding:20px}
button{padding:10px;background:#6366f1;color:white;border:none;cursor:pointer}
.ok{color:#22c55e}
.bad{color:#ef4444}
.warn{color:orange}
</style>
</head>

<body>

<div class="container">

<h2>🤖 Smart Procurement</h2>

<select id="supplier" onchange="loadPricelist()"></select>

<h3>📦 מחירון</h3>
<table>
<thead>
<tr>
<th>תיאור</th>
<th>מחיר</th>
</tr>
</thead>
<tbody id="price-body"></tbody>
</table>

<h3>📄 בדיקת חשבונית</h3>
<input type="file" id="file">
<button onclick="analyze()">בדוק</button>

<h3>📊 תוצאות</h3>
<table>
<thead>
<tr>
<th>תיאור</th>
<th>חשבונית</th>
<th>מאושר</th>
<th>פער</th>
<th>סטטוס</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div id="alerts"></div>

</div>

<script>

let cache = {};

// ✅ ספקים
async function loadSuppliers(){
    let res = await fetch('/api/get-suppliers')
    let data = await res.json()

    let sel = document.getElementById("supplier")
    sel.innerHTML = "<option value=''>בחר ספק</option>"

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option value="${s}">${s}</option>`
    })
}


// ✅ טעינת מחירון (עם cache)
async function loadPricelist(){

    let supplier = document.getElementById("supplier").value
    if(!supplier) return

    if(cache[supplier]){
        renderPricelist(cache[supplier])
        return
    }

    let res = await fetch(`/api/get-pricelist?supplier=${supplier}`)
    let data = await res.json()

    cache[supplier] = data.items
    renderPricelist(data.items)
}


// ✅ ציור מחירון
function renderPricelist(items){

    let body = document.getElementById("price-body")
    body.innerHTML = ""

    if(items.length === 0){
        body.innerHTML = "<tr><td colspan='2'>⚠️ אין נתונים</td></tr>"
        return
    }

    items.forEach(i=>{
        body.innerHTML += `
        <tr>
        <td>${i.description}</td>
        <td>${i.price}</td>
        </tr>`
    })
}


// ✅ בדיקת חשבונית
async function analyze(){

    const btn = document.querySelector("button")
    btn.disabled = true

    let sup = document.getElementById("supplier").value
    let file = document.getElementById("file").files[0]

    let fd = new FormData()
    fd.append("supplier", sup)
    fd.append("file", file)

    let res = await fetch('/api/analyze-invoice',{method:'POST',body:fd})
    let data = await res.json()

    render(data)

    btn.disabled = false
}


// ✅ ציור תוצאות
function render(data){

    let body = document.getElementById("body")
    body.innerHTML = ""

    data.results.forEach(r=>{

        let cls = r.difference > 10 ? 'bad' : r.difference > 0 ? 'warn':'ok'

        body.innerHTML += `
        <tr>
        <td>${r.description}</td>
        <td>${r.invoice_price}</td>
        <td>${r.approved_price ?? '-'}</td>
        <td>${r.difference ?? '-'}</td>
        <td class="${cls}">${r.status}</td>
        </tr>`
    })

    document.getElementById("alerts").innerHTML =
        data.alerts.map(a=>`🔴 ${a}`).join("<br>")
}


loadSuppliers();

</script>
</body>
</html>
