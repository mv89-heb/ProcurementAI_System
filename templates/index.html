<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BASE */
body {
    margin:0;
    font-family: Inter, Arial;
    background:#0b1220;
    color:white;
}

/* LAYOUT */
.app {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#020617;
    padding:20px;
}

.logo {
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.nav button {
    width:100%;
    background:#1e293b;
    border:none;
    color:white;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    cursor:pointer;
}

.nav button:hover {
    background:#334155;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar {
    padding:15px;
    background:#020617;
    display:flex;
    gap:10px;
}

select,input {
    padding:10px;
    border-radius:8px;
}

/* CONTENT */
.content {
    padding:20px;
    overflow:auto;
}

/* KPI */
.kpis {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.kpi {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

/* CARD */
.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th {
    padding:10px;
    background:#334155;
}

td {
    padding:10px;
    border-bottom:1px solid #475569;
}

tr:hover { background:#334155; }

/* STATUS */
.ok { color:#22c55e }
.warn { color:#facc15 }
.bad { color:#ef4444 }

/* SEARCH */
.search {
    margin-bottom:10px;
    padding:10px;
}

/* LOADING */
.loading {
    color:#aaa;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🚀 Procurement AI</div>

    <div class="nav">
        <button onclick="setView('dashboard')">📊 Dashboard</button>
        <button onclick="setView('table')">📋 Table</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <select id="supplier"></select>
    <button onclick="loadData()">טען</button>
</div>

<div class="content" id="content"></div>

</div>

</div>

<script>

let state = {
    view: "dashboard",
    supplier: null,
    items: []
};

let chart;


// ✅ change view
function setView(view){
    state.view = view;
    render();
}


// ✅ load suppliers
async function init(){

    let res = await fetch('/api/get-suppliers');
    let data = await res.json();

    let sel = document.getElementById("supplier");

    sel.innerHTML = "<option value=''>בחר ספק</option>";

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}


// ✅ load data
async function loadData(){

    let supplier = document.getElementById("supplier").value;

    if(!supplier) return;

    state.supplier = supplier;

    document.getElementById("content").innerHTML =
        "<div class='loading'>טוען נתונים...</div>";

    let res = await fetch(`/api/get-pricelist?supplier=${encodeURIComponent(supplier)}`);
    let data = await res.json();

    state.items = data.items || [];

    render();
}


// ✅ render main
function render(){

    if(state.view === "dashboard"){
        renderDashboard();
    } else {
        renderTableView();
    }
}


// ✅ dashboard view
function renderDashboard(){

    let items = state.items;

    if(items.length === 0){
        document.getElementById("content").innerHTML =
            "<div>⚠️ אין נתונים</div>";
        return;
    }

    let total = items.length;
    let avg = items.reduce((s,i)=>s+Number(i.price),0)/total;
    let max = Math.max(...items.map(i=>i.price));

    document.getElementById("content").innerHTML = `

    <div class="kpis">
        <div class="kpi">סה"כ<br>${total}</div>
        <div class="kpi">ממוצע<br>${avg.toFixed(2)}</div>
        <div class="kpi">יקר ביותר<br>${max}</div>
        <div class="kpi">ספק<br>${state.supplier}</div>
    </div>

    <div class="grid">
        <div class="card">
            <canvas id="chart"></canvas>
        </div>
    </div>

    `;

    renderChart(items);
}


// ✅ table view
function renderTableView(){

    let items = state.items;

    let html = `
    <input class="search" placeholder="חיפוש..." onkeyup="search(this.value)">
    <table>
    <thead>
    <tr>
    <th>SKU</th>
    <th>תיאור</th>
    <th>מחיר</th>
    </tr>
    </thead>
    <tbody id="tbody">
    </tbody>
    </table>
    `;

    document.getElementById("content").innerHTML = html;

    renderTable(items);
}


// ✅ render table
function renderTable(items){

    let body = document.getElementById("tbody");
    body.innerHTML = "";

    items.forEach(i=>{
        body.innerHTML += `
        <tr>
        <td>${i.sku}</td>
        <td>${i.description}</td>
        <td>${i.price}</td>
        </tr>`;
    });
}


// ✅ search
function search(text){

    let filtered = state.items.filter(i =>
        i.description.toLowerCase().includes(text.toLowerCase())
    );

    renderTable(filtered);
}


// ✅ chart
function renderChart(items){

    let labels = items.slice(0,10).map(i=>i.description);
    let values = items.slice(0,10).map(i=>i.price);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"bar",
        data:{
            labels,
            datasets:[{
                label:"מחירים",
                data:values
            }]
        }
    });
}


init();

</script>

</body>
</html>
