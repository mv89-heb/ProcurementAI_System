<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* TOP BAR */
.topbar {
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

select, button {
    padding:10px;
    border-radius:8px;
}

button {
    background:#6366f1;
    border:none;
    color:white;
}

/* KPI */
.kpis {
    display:flex;
    gap:10px;
}

.kpi {
    flex:1;
    background:#1e293b;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th {
    background:#1e293b;
    padding:10px;
}

td {
    padding:10px;
    border-bottom:1px solid #334155;
}

tr:hover {
    background:#1e293b;
}

/* STATUS */
.ok { color:#22c55e }
.bad { color:#ef4444 }

/* LOADING */
.loading {
    margin-top:10px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Procurement Dashboard</h2>

<div class="topbar">
    <select id="supplier" onchange="loadPricelist()"></select>
    <button onclick="dashboard()">📊 דשבורד</button>
</div>

<div class="kpis" id="kpis"></div>

<table>
<thead>
<tr>
<th>SKU</th>
<th>תיאור</th>
<th>מחיר</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="loading" id="loading"></div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;
let currentData = [];

// ✅ load suppliers
async function loadSuppliers(){

    let res = await fetch('/api/get-suppliers');
    let data = await res.json();

    let sel = document.getElementById("supplier");

    sel.innerHTML = "<option value=''>בחר ספק</option>";

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}


// ✅ load pricelist
async function loadPricelist(){

    let supplier = document.getElementById("supplier").value;
    if(!supplier) return;

    document.getElementById("loading").innerText = "טוען...";

    let res = await fetch(`/api/get-pricelist?supplier=${encodeURIComponent(supplier)}`);
    let data = await res.json();

    document.getElementById("loading").innerText = "";

    currentData = data.items;

    renderTable(currentData);
    renderChart(currentData);
    renderKPI(currentData);
}


// ✅ table
function renderTable(items){

    let body = document.getElementById("table");
    body.innerHTML = "";

    if(items.length === 0){
        body.innerHTML = "<tr><td colspan='3'>אין נתונים</td></tr>";
        return;
    }

    items.forEach(i=>{
        body.innerHTML += `
        <tr>
        <td>${i.sku}</td>
        <td>${i.description}</td>
        <td>${i.price}</td>
        </tr>`;
    });
}


// ✅ KPI
function renderKPI(items){

    let total = items.length;
    let avg = items.reduce((s,i)=>s+Number(i.price),0)/items.length;

    document.getElementById("kpis").innerHTML = `
        <div class="kpi">סה"כ: ${total}</div>
        <div class="kpi">ממוצע: ${avg.toFixed(2)}</div>
    `;
}


// ✅ chart
function renderChart(items){

    let labels = items.map(i=>i.description);
    let values = items.map(i=>i.price);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"bar",
        data:{
            labels,
            datasets:[{
                label:"מחירים",
                data:values,
                backgroundColor:"#6366f1"
            }]
        }
    });
}


// ✅ dashboard
async function dashboard(){

    let res = await fetch('/api/dashboard');
    let d = await res.json();

    alert(`
סה"כ פריטים: ${d.total}
ממוצע מחיר: ${d.avg}
`);
}


// INIT
loadSuppliers();

</script>

</body>
</html>
