<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

https://cdn.jsdelivr.net/npm/chart.js

https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color: white;
}

/* LAYOUT */
.wrapper {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: rgba(15,23,42,0.8);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
}

.sidebar h2 {
    color:#38bdf8;
}

.nav-btn {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: 0.3s;
}

.nav-btn:hover {
    background:#1e293b;
}

/* MAIN */
.main {
    flex:1;
    padding:20px;
}

/* TOP BAR */
.topbar {
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

select,input {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
}

button {
    background: linear-gradient(135deg,#6366f1,#4338ca);
    border:none;
    padding:10px 20px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
}

/* KPI */
.kpis {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
}

.kpi {
    padding:20px;
    border-radius:15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    text-align:center;
    font-size:18px;
}

/* TABLE */
table {
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th {
    background:#1e293b;
    padding:12px;
}

td {
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

/* STATUS */
.badge {
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.ok { background:#22c55e }
.warn { background:#facc15; color:black }
.bad { background:#ef4444 }

/* CARD GRID */
.grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:15px;
}

/* ALERTS */
.alert {
    margin-top:10px;
    padding:10px;
    background:#7f1d1d;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ Procurement AI</h2>

    <div class="nav-btn" onclick="dashboard()">📊 Dashboard</div>
    <div class="nav-btn" onclick="compare()">⚖️ Compare</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP BAR -->
<div class="topbar">
    <select id="supplier"></select>
    <input type="file" id="file">
    <button onclick="analyze()">Analyze</button>
</div>

<!-- KPI -->
<div class="kpis" id="kpis"></div>

<!-- GRID -->
<div class="grid">

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>מוצר</th>
<th>חשבונית</th>
<th>מאושר</th>
<th>פער</th>
<th>סטטוס</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

<!-- CHART -->
<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<!-- ALERTS -->
<div id="alerts"></div>

</div>
</div>

<script>

let chart;

// ✅ ספקים
async function loadSuppliers(){
    let res = await fetch("/api/get-suppliers");
    let data = await res.json();

    let sel = document.getElementById("supplier");
    sel.innerHTML = "<option>בחר ספק</option>";

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}


// ✅ ניתוח
async function analyze(){

    let sup = document.getElementById("supplier").value;
    let file = document.getElementById("file").files[0];

    let fd = new FormData();
    fd.append("supplier", sup);
    fd.append("file", file);

    let res = await fetch("/api/analyze-invoice", {
        method:"POST",
        body:fd
    });

    let data = await res.json();

    renderAll(data);
}


// ✅ RENDER
function renderAll(data){
    renderTable(data.results);
    renderKpis(data.results);
    renderChart(data.results);
    renderAlerts(data.alerts);
}


// ✅ TABLE
function renderTable(rows){

    let t = document.getElementById("table");
    t.innerHTML = "";

    rows.forEach(r=>{

        let cls = r.difference > 10 ? "bad" :
                  r.difference > 0 ? "warn" : "ok";

        t.innerHTML += `
        <tr>
        <td>${r.description}</td>
        <td>${r.invoice_price}</td>
        <td>${r.approved_price || "-"}</td>
        <td>${r.difference || "-"}</td>
        <td><span class="badge ${cls}">${r.status}</span></td>
        </tr>`;
    });
}


// ✅ KPI
function renderKpis(rows){

    let total = rows.length;
    let issues = rows.filter(r=>r.status !== "תקין").length;
    let savings = rows.reduce((s,r)=> s + Math.max(-(r.difference||0),0),0);

    document.getElementById("kpis").innerHTML = `
    <div class="kpi">סה"כ<br>${total}</div>
    <div class="kpi">חריגות<br>${issues}</div>
    <div class="kpi">💰 חיסכון<br>${savings.toFixed(2)}</div>
    `;
}


// ✅ CHART
function renderChart(rows){

    let labels = rows.map(r=>r.description);
    let data = rows.map(r=>r.difference || 0);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"bar",
        data:{
            labels,
            datasets:[{
                label:"פערים",
                data,
                backgroundColor:"#6366f1"
            }]
        }
    });
}


// ✅ ALERTS
function renderAlerts(alerts){

    let div = document.getElementById("alerts");

    div.innerHTML = alerts.map(a =>
        `<div class="alert">⚠️ ${a}</div>`
    ).join("");
}


// ✅ dashboard
async function dashboard(){
    let res = await fetch("/api/dashboard");
    let d = await res.json();

    alert(`סה"כ: ${d.total}\nממוצע: ${d.avg}`);
}

// ✅ compare
async function compare(){
    let name = prompt("שם מוצר");
    let res = await fetch(`/api/compare-product?name=${name}`);
    let d = await res.json();

    alert(JSON.stringify(d,null,2));
}

loadSuppliers();

</script>

</body>
</html>
