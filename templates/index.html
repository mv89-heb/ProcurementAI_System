<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת רכש חכמה | AI Procurement</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-panel: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08); --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-primary: #3b82f6; --accent-secondary: #8b5cf6;
            --success: #10b981; --danger: #ef4444; --text-main: #f8fafc; --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; }
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(59,130,246,0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139,92,246,0.15), transparent 25%);
        }
        .glass-panel {
            background: var(--bg-panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: var(--glass-shadow);
        }
        .sidebar { width: 280px; height: 100%; padding: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .logo-container { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; margin-bottom: 32px; }
        .logo-icon { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: 12px; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: all 0.3s ease; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: var(--text-main); border-right: 4px solid var(--accent-primary); }
        .nav-item i { font-size: 18px; width: 24px; text-align: center; }
        
        .main-content { flex: 1; padding: 24px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; }
        .search-bar { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; width: 400px; color: var(--text-muted); }
        .search-bar input { background: none; border: none; color: var(--text-main); outline: none; width: 100%; }
        .user-actions { display: flex; align-items: center; gap: 20px; }
        .action-icon { font-size: 20px; color: var(--text-muted); cursor: pointer; position: relative; }
        .action-icon:hover { color: var(--text-main); }
        .user-profile { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; }
        .kpi-card { padding: 24px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.3s ease; }
        .kpi-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }
        .kpi-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 14px; }
        .kpi-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .kpi-value { font-size: 32px; font-weight: 700; }
        .trend { font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .trend.up { color: var(--success); } .trend.down { color: var(--danger); }
        
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        
        .compare-section select { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px; border-radius: 8px; width: 100%; height: 120px; outline: none; }
        .compare-section select option { background: var(--bg-dark); color: white; padding: 5px; }
        .result-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .best { color: var(--success); font-weight: bold; } .bad { color: var(--danger); }

        /* Negotiation Drawer */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 99; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .drawer { position: fixed; top: 0; left: -500px; width: 450px; height: 100%; background: rgba(15,23,42,0.95); border-right: 1px solid var(--glass-border); z-index: 100; transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
        .drawer.open { left: 0; } .drawer-overlay.open { opacity: 1; visibility: visible; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .drawer-title { font-size: 20px; font-weight: 600; display: flex; gap: 12px; align-items: center; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .drawer-content { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        .context-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        
        .skeleton-text { height: 16px; border-radius: 4px; background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; margin-bottom: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .glass-textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; color: var(--text-main); resize: vertical; line-height: 1.5; outline: none; }
    </style>
</head>
<body>

    <aside class="glass-panel sidebar">
        <div class="logo-container">
            <i class="fa-solid fa-cube logo-icon"></i><span>ProcureAI</span>
        </div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-code-compare"></i> השוואת ספקים חכמה</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> לוח בקרה ראשי</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-truck-fast"></i> ניהול ספקים</a>
        <a href="#" class="nav-item" style="margin-top: auto;"><i class="fa-solid fa-gear"></i> הגדרות מערכת</a>
    </aside>

    <main class="main-content">
        <header class="glass-panel topbar">
            <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" placeholder="חפש מוצרים, ספקים או תובנות AI..."></div>
            <div class="user-actions"><div class="user-profile">MV</div></div>
        </header>

        <div class="kpi-grid">
            <div class="glass-panel kpi-card"><div class="kpi-header"><span>חיסכון פוטנציאלי</span><div class="kpi-icon" style="color: var(--success);"><i class="fa-solid fa-piggy-bank"></i></div></div><div class="kpi-value">₪42,500</div></div>
            <div class="glass-panel kpi-card"><div class="kpi-header"><span>חריגות שזוהו</span><div class="kpi-icon" style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i></div></div><div class="kpi-value">12</div></div>
        </div>

        <div class="glass-panel compare-section" style="padding: 24px;">
            <div class="section-title">בחר ספקים להשוואה (Ctrl לבחירה מרובה)</div>
            <div style="display: flex; gap: 15px; align-items: stretch;">
                <select id="suppliers-select" multiple></select>
                <button class="btn btn-primary" onclick="runComparison()"><i class="fa-solid fa-play"></i> בצע השוואה</button>
            </div>
        </div>
        
        <div id="results-container"></div>
    </main>

    <div class="drawer-overlay" id="negotiation-overlay" onclick="closeNegotiationDrawer()"></div>
    <div class="glass-panel drawer" id="negotiation-drawer">
        <div class="drawer-header">
            <div class="drawer-title"><i class="fa-solid fa-robot" style="color: var(--accent-primary);"></i> סוכן AI למשא ומתן</div>
            <button class="close-btn" onclick="closeNegotiationDrawer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-content">
            <div class="glass-panel" style="padding: 16px;">
                <div class="context-row"><span>ספק:</span> <strong id="neg-supplier"></strong></div>
                <div class="context-row"><span>מוצר:</span> <strong id="neg-product"></strong></div>
                <div class="context-row"><span>מחיר נוכחי:</span> <strong class="bad" id="neg-current-price"></strong></div>
                <div class="context-row" style="border:none;"><span>מחיר שוק (יעד):</span> <strong class="best" id="neg-target-price"></strong></div>
            </div>

            <div id="ai-loading" style="display: none; flex-direction: column;">
                <div class="skeleton-text" style="width: 100%;"></div>
                <div class="skeleton-text" style="width: 80%;"></div>
                <div class="skeleton-text" style="width: 90%;"></div>
                <div style="font-size: 13px; color: var(--accent-primary); text-align: center; margin-top: 10px;">ה-AI מנסח פנייה אסטרטגית...</div>
            </div>

            <div id="ai-result" style="display: none;">
                <div style="font-size: 14px; margin-bottom: 10px; color: var(--text-muted);">טיוטת אימייל:</div>
                <textarea id="ai-draft-content" class="glass-textarea" rows="12"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-secondary" style="flex: 1; padding: 10px; font-size: 13px;" onclick="generateNegotiation(true)"><i class="fa-solid fa-bolt"></i> נסח אגרסיבי</button>
                    <button class="btn btn-primary" style="flex: 1;" onclick="sendNegotiationEmail()"><i class="fa-solid fa-paper-plane"></i> שלח</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // טעינת רשימת הספקים מהשרת עם עליית העמוד
        async function loadSuppliers() {
            try {
                let res = await fetch('/api/get-suppliers');
                let data = await res.json();
                let html = '';
                data.suppliers.forEach(s => html += `<option value="${s}">${s}</option>`);
                document.getElementById('suppliers-select').innerHTML = html;
            } catch (e) { console.error("Error loading suppliers"); }
        }
        window.onload = loadSuppliers;

        // ביצוע ההשוואה
        async function runComparison() {
            let sel = document.getElementById("suppliers-select");
            let selected = Array.from(sel.selectedOptions).map(o => o.value);
            if(selected.length < 2) return alert("בחר לפחות 2 ספקים");

            document.getElementById("results-container").innerHTML = '<div style="text-align:center; padding: 40px;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>';

            try {
                let res = await fetch('/api/compare-suppliers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ suppliers: selected })
                });
                let data = await res.json();
                
                let html = '';
                data.results.forEach(r => {
                    html += `<div class="result-card">
                        <div class="section-title">📦 ${r.product}</div>
                        <div style="margin-bottom: 15px;">⭐ מחיר יעד: <span class="best">₪${r.best_price} (${r.best_supplier})</span></div>`;
                    
                    r.offers.forEach(o => {
                        let isBad = o.difference > 0;
                        html += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                            <span class="${isBad ? 'bad' : 'best'}">🛒 ${o.supplier} ➜ ₪${o.price} ${isBad ? `(+₪${o.difference})` : ''}</span>`;
                        
                        if (isBad) {
                            html += `<button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" 
                                onclick="openNegotiationDrawer('${o.supplier}', '${r.product}', ${o.price}, ${r.best_price})">
                                <i class="fa-solid fa-robot"></i> מו"מ אוטומטי</button>`;
                        }
                        html += `</div>`;
                    });
                    html += `</div>`;
                });
                document.getElementById("results-container").innerHTML = html;
            } catch(e) { 
                document.getElementById("results-container").innerHTML = 'שגיאה בחישוב'; 
            }
        }

        // --- לוגיקת סוכן המשא ומתן ---
        let currentNegotiationData = {};

        function openNegotiationDrawer(supplier, product, currentPrice, targetPrice) {
            currentNegotiationData = { supplier, product, currentPrice, targetPrice };
            document.getElementById("neg-supplier").innerText = supplier;
            document.getElementById("neg-product").innerText = product;
            document.getElementById("neg-current-price").innerText = `₪${currentPrice}`;
            document.getElementById("neg-target-price").innerText = `₪${targetPrice}`;
            
            document.getElementById("negotiation-overlay").classList.add("open");
            document.getElementById("negotiation-drawer").classList.add("open");
            
            generateNegotiation(false);
        }

        function closeNegotiationDrawer() {
            document.getElementById("negotiation-overlay").classList.remove("open");
            document.getElementById("negotiation-drawer").classList.remove("open");
        }

        async function generateNegotiation(isAggressive) {
            document.getElementById("ai-loading").style.display = "flex";
            document.getElementById("ai-result").style.display = "none";
            
            try {
                let res = await fetch('/api/generate-negotiation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...currentNegotiationData, aggressive: isAggressive })
                });
                let data = await res.json();
                
                document.getElementById("ai-loading").style.display = "none";
                document.getElementById("ai-draft-content").value = data.draft;
                document.getElementById("ai-result").style.display = "block";
            } catch (e) {
                alert("שגיאה בתקשורת מול ג'מיני");
                document.getElementById("ai-loading").style.display = "none";
            }
        }

        function sendNegotiationEmail() {
            const text = document.getElementById("ai-draft-content").value;
            window.location.href = `mailto:?subject=עדכון תנאים מסחריים - ${currentNegotiationData.supplier}&body=${encodeURIComponent(text)}`;
            closeNegotiationDrawer();
        }
    </script>
</body>
</html>
