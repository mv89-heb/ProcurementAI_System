<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<style>

body {
    margin:0;
    font-family:"Inter", Arial;
    background:#0b1220;
    color:#e2e8f0;
}

/* --- LAYOUT --- */
.container {
    max-width:1200px;
    margin:auto;
    padding:30px;
}

/* --- HEADER --- */
.header {
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

/* --- SELECT --- */
select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#020617;
    color:white;
}

/* --- BUTTON --- */
button {
    margin-top:10px;
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    border:none;
    padding:10px;
    width:100%;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    opacity:0.9;
}

/* --- CARDS --- */
.card {
    background:#111827;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
}

/* --- GRID --- */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* --- KPI --- */
.kpi {
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

/* --- TOTAL GRID --- */
.kpis {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

/* --- PRODUCT CARD --- */
.product {
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

/* --- PRICE --- */
.best {
    color:#22c55e;
    font-weight:bold;
}

.bad {
    color:#ef4444;
}

/* --- TITLE --- */
.title {
    font-size:18px;
    margin-bottom:10px;
    color:#cbd5f5;
}

.subtitle {
    font-size:13px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
🚀 מערכת השוואת ספקים מבוססת AI
</div>

<!-- SELECT -->
<div class="card">
<div class="title">בחר ספקים להשוואה</div>

<select id="suppliers" multiple size="5"></select>

<button onclick="compare()">⚖️ בצע השוואה</button>
</div>


<!-- KPI -->
<div id="kpis"></div>

<!-- INSIGHTS -->
<div id="insights"></div>

<!-- RANKING -->
<div id="ranking"></div>

<!-- RESULTS -->
<div id="results"></div>

</div>

<script>


// ✅ טעינת ספקים
async function loadSuppliers(){

    let res = await fetch('/api/get-suppliers')
    let data = await res.json()

    let sel = document.getElementById("suppliers")

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option value="${s}">${s}</option>`
    })
}


// ✅ השוואה
async function compare(){

    let sel = document.getElementById("suppliers")

    let selected = Array.from(sel.selectedOptions)
        .map(o=>o.value)

    if(selected.length < 2){
        alert("בחר לפחות 2 ספקים");
        return;
    }

    let res = await fetch('/api/compare-suppliers',{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({suppliers:selected})
    })

    let data = await res.json()

    renderAll(data)
}


// ✅ רינדור הכל
function renderAll(data){

    renderKPI(data)
    renderInsights(data)
    renderRanking(data)
    renderResults(data)
}


// ✅ KPI
function renderKPI(data){

    let totalProducts = data.results.length

    let bestCount = 0

    data.results.forEach(r => {
        bestCount += r.offers.length
    })

    document.getElementById("kpis").innerHTML = `
        <div class="kpis">

            <div class="kpi">
                📦 מוצרים מושווים<br>
                <b>${totalProducts}</b>
            </div>

            <div class="kpi">
                🛒 ספקים<br>
                <b>${data.ranking.length}</b>
            </div>

            <div class="kpi">
                ⚡ תובנות<br>
                <b>${data.insights.length}</b>
            </div>

        </div>
    `
}


// ✅ INSIGHTS
function renderInsights(data){

    document.getElementById("insights").innerHTML = `
        <div class="card">
            <div class="title">📊 תובנות חכמות</div>
            ${data.insights.map(i => `<div>${i}</div>`).join("")}
        </div>
    `
}


// ✅ RANKING
function renderRanking(data){

    document.getElementById("ranking").innerHTML = `
        <div class="card">
            <div class="title">🏆 דירוג ספקים</div>

            ${data.ranking.map(r => `
                <div>
                    ${r[0]} ➜ 
                    <span class="${r[1] === 0 ? 'best':'bad'}">
                        ${r[1].toFixed(2)}
                    </span>
                </div>
            `).join("")}

        </div>
    `
}


// ✅ RESULTS
function renderResults(data){

    document.getElementById("results").innerHTML =
        data.results.map(r => {

            return `
            <div class="product">

                <div class="title">📦 ${r.product}</div>

                <div class="subtitle">
                ⭐ המלצה: ${r.best_supplier} (${r.best_price})
                </div>

                <br>

                ${r.offers.map(o => `
                    <div class="${o.difference === 0 ? 'best' : 'bad'}">
                        🛒 ${o.supplier} ➜ ${o.price} (${o.difference})
                    </div>
                `).join("")}

            </div>
            `
        }).join("")
}


// INIT
loadSuppliers()


</script>

</body>
</html>
