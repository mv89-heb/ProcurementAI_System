<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מערכת מחירונים</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #2563eb;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ddd;
    padding: 8px;
}

tr:hover {
    background: #f1f5f9;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 מערכת מחירונים</h2>

<label>בחר ספק:</label>
<select id="supplier" onchange="loadPricelist()">
    <option value="">טוען...</option>
</select>

<table>
<thead>
<tr>
<th>מק"ט</th>
<th>תיאור</th>
<th>מחיר</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</div>

<script>

// ✅ טען ספקים
async function loadSuppliers(){

    const res = await fetch('/api/get-suppliers');
    const data = await res.json();

    const sel = document.getElementById("supplier");
    sel.innerHTML = "<option value=''>בחר ספק</option>";

    data.suppliers.forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}


// ✅ טען מחירון של ספק
async function loadPricelist(){

    const supplier = document.getElementById("supplier").value;

    if (!supplier) return;

    const res = await fetch(`/api/get-pricelist?supplier=${supplier}`);
    const data = await res.json();

    if (data.error){
        alert(data.error);
        return;
    }

    const body = document.getElementById("table-body");
    body.innerHTML = "";

    data.items.forEach(item => {
        body.innerHTML += `
        <tr>
            <td>${item.sku}</td>
            <td>${item.description}</td>
            <td>${item.price}</td>
        </tr>
        `;
    });
}


// הפעלה ראשונית
loadSuppliers();

</script>

</body>
</html>
