<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial }
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin:10px}
button{background:#6366f1;color:white;padding:10px;border:none;cursor:pointer}
.ok{color:#22c55e}
.bad{color:#ef4444}
.warn{color:orange}
</style>
</head>

<body>

<div class="container">

<h2>🤖 Smart Procurement System</h2>

<select id="supplier"></select>

<input type="file" id="file">
<button onclick="analyze()">בדוק</button>

<div id="kpi"></div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>תיאור</th>
<th>חשבונית</th>
<th>מאושר</th>
<th>פער</th>
<th>סטטוס</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div id="alerts"></div>

</div>

<script>

let chart;
let cache = {};

// ✅ ספקים
async function loadSuppliers(){
    let res = await fetch('/api/get-suppliers')
    let data = await res.json()

    let sel = document.getElementById("supplier")
    data.suppliers.forEach(s=> sel.innerHTML += `<option>${s}</option>`)
}


// ✅ analyze עם UX משופר
async function analyze(){

    const btn = document.querySelector("button")
    btn.disabled = true

    let sup = document.getElementById("supplier").value
    let file = document.getElementById("file").files[0]

    let fd = new FormData()
    fd.append("supplier", sup)
    fd.append("file", file)

    let res = await fetch('/api/analyze-invoice',{method:'POST',body:fd})
    let data = await res.json()

    localStorage.setItem("last_analysis", JSON.stringify(data))

    render(data)

    btn.disabled = false
}


// ✅ render הכל
function render(data){
    renderTable(data.results)
    renderKPI(data.results)
    renderChart(data.results)
    renderAlerts(data.alerts)
}


// ✅ טבלה
function renderTable(rows){
    let body = document.getElementById("body")
    body.innerHTML=""

    rows.forEach(r=>{
        let cls = r.difference > 10 ? 'bad' : r.difference > 0 ? 'warn':'ok'

        body.innerHTML += `
        <tr>
        <td>${r.description}</td>
        <td>${r.invoice_price}</td>
        <td>${r.approved_price ?? '-'}</td>
        <td>${r.difference ?? '-'}</td>
        <td class="${cls}">${r.status}</td>
        </tr>`
    })
}


// ✅ KPI
function renderKPI(rows){
    let total = rows.length
    let issues = rows.filter(r=>r.status !== 'תקין').length
    let savings = rows.reduce((s,r)=> s + Math.max(-(r.difference||0),0),0)

    document.getElementById("kpi").innerHTML = `
        <div class="card">סה"כ: ${total}</div>
        <div class="card">חריגות: ${issues}</div>
        <div class="card">חיסכון: ${savings}</div>
    `
}


// ✅ גרף
function renderChart(rows){
    let labels = rows.map(r=>r.description)
    let data = rows.map(r=>r.difference || 0)

    if(chart) chart.destroy()

    chart = new Chart(document.getElementById("chart"), {
        type:'bar',
        data:{ labels, datasets:[{label:"פערים",data}] }
    })
}


// ✅ alerts
function renderAlerts(alerts){
    document.getElementById("alerts").innerHTML =
        alerts.map(a=>`<div>🔴 ${a}</div>`).join("")
}


loadSuppliers()

</script>
</body>
</html>
