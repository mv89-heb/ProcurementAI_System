<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Procurement AI - Enterprise</title>
<style>
    body { font-family:"Inter", Arial, sans-serif; background:#0f172a; color:#f8fafc; margin:0; padding:20px; }
    .container { max-width:1200px; margin:auto; }
    .header { font-size:28px; font-weight:800; margin-bottom:10px; color:#38bdf8; }
    .company-badge { display:inline-block; background:#1e293b; padding:5px 15px; border-radius:20px; font-size:14px; margin-bottom:30px; border:1px solid #334155; }
    .card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:20px; border:1px solid #334155; }
    .title { font-size:18px; margin-bottom:15px; color:#e2e8f0; font-weight:bold; }
    input[type="text"], input[type="file"], select { width:100%; padding:12px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:white; margin-bottom:15px; box-sizing:border-box; }
    button { background:#3b82f6; border:none; padding:12px 20px; width:100%; color:white; font-weight:bold; border-radius:8px; cursor:pointer; transition:0.3s; }
    button:hover { background:#2563eb; }
    .kpis { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:20px; }
    .kpi { background:#0f172a; padding:20px; border-radius:10px; text-align:center; border:1px solid #334155; }
    .kpi b { display:block; font-size:24px; color:#38bdf8; margin-top:10px; }
    .product { background:#0f172a; padding:15px; border-radius:10px; margin-top:15px; border:1px solid #334155; }
    .best { color:#10b981; font-weight:bold; } .bad { color:#ef4444; }
    .loader { display:none; text-align:center; color:#38bdf8; margin:10px 0; font-weight:bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header">🚀 מנוע רכש AI - Enterprise</div>
    <div class="company-badge" id="tenant-display">🏢 חברה: demo_company</div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <div class="title">📥 הזנת מחירון חדש (AI Processing)</div>
            <input type="text" id="sup-name" placeholder="שם הספק (לדוגמה: אופיס דיפו)">
            <input type="file" id="sup-file" accept=".pdf,image/*">
            <button onclick="uploadPricelist()">עבד מחירון ושמור ב-DB</button>
            <div id="upload-loader" class="loader">מעבד מסמך ומייצר וקטורים, אנא המתן...</div>
        </div>

        <div class="card">
            <div class="title">⚖️ מנוע השוואת ספקים חכמה</div>
            <select id="suppliers" multiple size="5"></select>
            <button onclick="compareSuppliers()">הרץ אלגוריתם השוואה</button>
            <div id="compare-loader" class="loader">מחשב מרחקים וקטוריים...</div>
        </div>
    </div>

    <div id="dashboard"></div>
</div>

<script>
    const COMPANY_ID = "demo_company"; // הגדרת Multi-Tenancy

    async function loadSuppliers() {
        try {
            let res = await fetch(`/api/get-suppliers?company_id=${COMPANY_ID}`);
            let data = await res.json();
            let sel = document.getElementById("suppliers");
            sel.innerHTML = "";
            (data.suppliers || []).forEach(s => {
                sel.innerHTML += `<option value="${s}">${s}</option>`;
            });
        } catch(e) { console.error("Error:", e); }
    }

    async function uploadPricelist() {
        let name = document.getElementById("sup-name").value;
        let file = document.getElementById("sup-file").files[0];
        if(!name || !file) return alert("הזן שם ספק וקובץ");

        document.getElementById("upload-loader").style.display = "block";
        let fd = new FormData();
        fd.append("company_id", COMPANY_ID);
        fd.append("supplier_name", name);
        fd.append("file", file);

        try {
            let res = await fetch('/api/upload-pricelist', { method: 'POST', body: fd });
            let data = await res.json();
            document.getElementById("upload-loader").style.display = "none";
            alert(data.message || data.error);
            loadSuppliers(); // רענון רשימה
        } catch(e) { alert("שגיאה בהעלאה"); }
    }

    async function compareSuppliers() {
        let sel = document.getElementById("suppliers");
        let selected = Array.from(sel.selectedOptions).map(o => o.value);
        if(selected.length < 2) return alert("בחר לפחות 2 ספקים להשוואה");

        document.getElementById("compare-loader").style.display = "block";
        document.getElementById("dashboard").innerHTML = "";

        try {
            let res = await fetch('/api/compare-suppliers', {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ company_id: COMPANY_ID, suppliers: selected })
            });
            let data = await res.json();
            document.getElementById("compare-loader").style.display = "none";
            
            if(data.error) return alert(data.error);
            renderDashboard(data);
        } catch(e) { alert("שגיאה בחישוב"); }
    }

    function renderDashboard(data) {
        let dash = document.getElementById("dashboard");
        let html = `<div class="kpis">
            <div class="kpi">מוצרים שהוצלבו<b>${data.results.length}</b></div>
            <div class="kpi">ספקים נבדקו<b>${data.ranking.length}</b></div>
        </div>`;

        html += `<div class="card"><div class="title">📊 תובנות (Insights)</div>`;
        data.insights.forEach(i => html += `<div>${i}</div>`);
        html += `</div><div class="card"><div class="title">🏆 תוצאות השוואה למוצר</div>`;

        data.results.forEach(r => {
            html += `<div class="product">
                <div class="title" style="color:#cbd5e1; margin-bottom:5px;">📦 ${r.product}</div>
                <div style="font-size:14px; margin-bottom:10px;">⭐ המלצת המערכת: <span class="best">${r.best_supplier} (${r.best_price} ₪)</span></div>
                ${r.offers.map(o => `
                    <div class="${o.difference === 0 ? 'best' : 'bad'}" style="font-size:13px; margin-top:4px;">
                        🛒 ${o.supplier} ➜ ${o.price} ₪ ${o.difference > 0 ? `(+${o.difference})` : ''}
                    </div>
                `).join("")}
            </div>`;
        });
        
        dash.innerHTML = html + "</div>";
    }

    loadSuppliers();
</script>
</body>
</html>
