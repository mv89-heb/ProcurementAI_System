<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מערכת בקרה חכמה</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

select, input {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #2563eb;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ddd;
    padding: 8px;
}

.ok {
    background: #dcfce7;
    color: green;
}

.bad {
    background: #fee2e2;
    color: red;
}

.card {
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    background: #e0e7ff;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 מערכת בקרה חכמה</h2>

<!-- --- העלאת מחירון --- -->
<div class="card">
<h3>📥 העלאת מחירון</h3>

<input type="file" id="pricelistFile">
<button onclick="uploadPricelist()">שמור מחירון</button>

</div>

<!-- --- בדיקת חשבונית --- -->
<div class="card">
<h3>🔍 בדיקת חשבונית</h3>

<select id="supplier">
    <option value="">בחר ספק</option>
</select>

<input type="file" id="invoice">

<button onclick="analyze()">בדוק חשבונית</button>

</div>

<!-- --- סיכום --- -->
<div id="summary"></div>

<!-- --- טבלה --- -->
<table>
<thead>
<tr>
<th>מק\"ט</th>
<th>מחיר בפועל</th>
<th>מחיר מאושר</th>
<th>סטטוס</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>

// ✅ טען ספקים
async function loadSuppliers(){
    const res = await fetch('/api/get-suppliers');
    const data = await res.json();

    const sel = document.getElementById("supplier");
    sel.innerHTML = "<option value=''>בחר ספק</option>";

    data.suppliers.forEach(s => {
        sel.innerHTML += `<option value="${s}">${s}</option>`;
    });
}


// ✅ העלאת מחירון
async function uploadPricelist(){
    const file = document.getElementById("pricelistFile").files[0];

    if(!file){
        alert("בחר קובץ מחירון");
        return;
    }

    const fd = new FormData();
    fd.append("file", file);

    const res = await fetch('/api/upload-pricelist', {
        method: "POST",
        body: fd
    });

    const data = await res.json();

    alert("מחירון נשמר עבור: " + data.supplier);

    loadSuppliers();
}


// ✅ בדיקת חשבונית
async function analyze(){

    const supplier = document.getElementById("supplier").value;
    const file = document.getElementById("invoice").files[0];

    if(!supplier || !file){
        alert("בחר ספק וקובץ");
        return;
    }

    const fd = new FormData();
    fd.append("supplier_name", supplier);
    fd.append("invoice", file);

    const res = await fetch('/api/analyze-prices', {
        method: "POST",
        body: fd
    });

    const data = await res.json();

    const body = document.getElementById("body");
    const summary = document.getElementById("summary");

    body.innerHTML = "";

    let ok = 0;
    let bad = 0;

    data.results.forEach(r => {

        let match = r.found;
        if(match) ok++; else bad++;

        body.innerHTML += `
        <tr class="${match ? 'ok':'bad'}">
            <td>${r.sku}</td>
            <td>${r.invoice_price}</td>
            <td>${r.approved_price ?? '---'}</td>
            <td>${match ? '✅ תקין':'❌ חריגה'}</td>
        </tr>
        `;
    });

    summary.innerHTML = `
        <div class="card">
            ✅ תקינים: ${ok} |
            ❌ חריגים: ${bad}
        </div>
    `;
}


// הפעלה ראשונית
loadSuppliers();

</script>

</body>
</html>
