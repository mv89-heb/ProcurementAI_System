<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מערכת בקרה חכמה</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:1000px; margin:auto; background:white; padding:20px; border-radius:10px; }
button { padding:10px; background:blue; color:white; border:none; cursor:pointer; margin-top:10px; }

.ok { background:#dcfce7; }
.bad { background:#fee2e2; }
</style>
</head>

<body>

<div class="container">

<h2>🤖 מערכת בקרה חכמה</h2>

<select id="supplier"></select>
<input type="file" id="file">
<button onclick="analyze()">בדוק חשבונית</button>

<div id="insights"></div>

<table>
<thead>
<tr>
<th>SKU</th>
<th>מחיר חשבונית</th>
<th>מחיר מאושר</th>
<th>פער</th>
<th>סטטוס</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>

async function loadSuppliers(){
    const res = await fetch('/api/get-suppliers');
    const data = await res.json();

    const sel = document.getElementById("supplier");
    sel.innerHTML = "";

    data.suppliers.forEach(s=>{
        sel.innerHTML += `<option>${s}</option>`;
    });
}

async function analyze(){

    const sup = document.getElementById("supplier").value;
    const file = document.getElementById("file").files[0];

    const fd = new FormData();
    fd.append("supplier", sup);
    fd.append("file", file);

    const res = await fetch('/api/analyze-invoice', {
        method:'POST',
        body:fd
    });

    const data = await res.json();

    const body = document.getElementById("body");
    body.innerHTML = "";

    data.results.forEach(r=>{
        body.innerHTML += `
        <tr class="${r.status === 'תקין' ? 'ok':'bad'}">
        <td>${r.sku}</td>
        <td>${r.invoice_price}</td>
        <td>${r.approved_price ?? '-'}</td>
        <td>${r.difference ?? '-'}</td>
        <td>${r.status}</td>
        </tr>`;
    });

    document.getElementById("insights").innerHTML = `
        <h3>📊 תובנות</h3>
        סה"כ שורות: ${data.insights.total}<br>
        חריגות: ${data.insights.issues}<br>
        התראות:<br>
        ${data.insights.alerts.join("<br>")}
    `;
}

loadSuppliers();

</script>

</body>
</html>
