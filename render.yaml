services:
  - type: web
    name: procurement-ai-system
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
